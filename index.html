<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | عدنان ولينا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050a0f; color: white; font-family: 'Cairo', sans-serif; margin: 0; text-align: center; }
        header { background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.4); }
        
        /* رسالة الاعتذار */
        .notice { 
            background: #fff3cd; color: #856404; padding: 15px; 
            margin: 20px auto; max-width: 600px; border-radius: 8px; 
            border-right: 5px solid #ffeeba; font-size: 0.9rem; font-weight: bold;
        }

        .video-wrapper { max-width: 800px; margin: 20px auto; padding: 10px; background: #111b27; border-radius: 15px; }
        
        /* تصميم زر الإعلان */
        .ad-btn { 
            display: block; background: #ff9800; color: black; padding: 15px; 
            text-decoration: none; border-radius: 10px; font-weight: bold; 
            margin-bottom: 20px; cursor: pointer; border: none; width: 100%; font-family: 'Cairo';
        }

        /* حاوية الفيديو (مخفية في البداية) */
        #player-container { display: none; margin-top: 20px; }
        
        /* جعل الفيديو متجاوب مع الشاشة */
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px; }

        .footer { opacity: 0.5; font-size: 0.8rem; margin-top: 40px; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
</header>

<div class="notice">
    📢 نعتذر عن أي تخبط تقني؛ الموقع لا يزال جديداً وتحت التطوير لضمان أفضل جودة مشاهدة لكم. شكراً لصبركم!
</div>

<div class="video-wrapper">
    <h3>عدنان ولينا - الحلقة 01</h3>
    
    <button onclick="startWatching()" class="ad-btn">فتح سيرفر المشاهدة 🔓</button>

    <div id="player-container">
        <div class="responsive-iframe">
            <iframe src="https://meyon.com.ye/videos/embed/1cb15e94-c5ef-4766-95fb-1d736a545d2e" frameborder="0" allowfullscreen="" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>
</div>

<footer class="footer">جميع الحقوق محفوظة - صدى الطفولة &copy; 2026</footer>

<script>
    function startWatching() {
        // 1. فتح الإعلان في صفحة جديدة (للربح)
        window.open('https://www.profitablecpmratenetwork.com/e41dj2h87?key=bef514b5ca3fa945e7a3b60e4a9ef21a', '_blank');
        
        // 2. إظهار مشغل الفيديو في الصفحة
        document.getElementById('player-container').style.display = 'block';
    }
</script>

</body>
</html>
