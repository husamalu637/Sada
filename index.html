<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | عدنان ولينا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #ff9800; --bg: #0b0f19; --card: #161e2e; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 50px; }
        header { width: 100%; background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 30px 0; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .main-container { max-width: 800px; width: 95%; margin: 20px auto; text-align: center; }
        
        /* مشغل الفيديو بتصميم جديد */
        .video-box { background: #000; border-radius: 15px; overflow: hidden; border: 2px solid var(--primary); display: none; margin-bottom: 25px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px; background: var(--card); padding: 20px; border-radius: 15px; }
        .ep-btn { background: #252f44; color: white; border: none; padding: 12px 0; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .ep-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
        
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--primary); }
        footer { margin-top: 30px; opacity: 0.5; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
</header>

<div class="main-container">
    <div id="playerContainer" class="video-box">
        <div class="video-wrapper">
            <iframe id="videoIframe" src="" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
        <div id="epTitle" style="padding: 10px; font-size: 0.9rem; border-top: 1px solid #333;"></div>
    </div>

    <h2>اختر رقم الحلقة:</h2>
    <div class="episodes-grid" id="grid"></div>
</div>

<script>
    const episodes = [
        { n: 1, id: "1cb15e94-c5ef-4766-95fb-1d736a545d2e" },
        { n: 2, id: "0fbbfac4-cb1d-49d8-8a27-dbfb8b3b526e" },

    ];

    const grid = document.getElementById('grid');
    const playerBox = document.getElementById('playerContainer');
    const iframe = document.getElementById('videoIframe');
    const epTitle = document.getElementById('epTitle');

    episodes.forEach(ep => {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = ep.n;
        btn.onclick = () => {
            // تصفير المشغل لضمان إعادة التحميل
            iframe.src = "";
            
            // فتح المشغل وتغيير الحلقة
            setTimeout(() => {
                playerBox.style.display = 'block';
                iframe.src = `https://meyon.com.ye/videos/embed/${ep.id}`;
                epTitle.innerText = "تشاهد الآن الحلقة رقم " + ep.n;
                
                // تمييز الزر النشط
                document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                playerBox.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        };
        grid.appendChild(btn);
    });
</script>
