<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | عدنان ولينا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #ff9800; --bg: #0b0f19; --card: #161e2e; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 30px 0; text-align: center; }
        .main-container { max-width: 850px; width: 95%; margin: 20px auto; text-align: center; }
        .video-box { background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--primary); margin-bottom: 25px; display: none; }
        .res-v { position: relative; padding-bottom: 56.25%; height: 0; }
        .res-v iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 12px; background: var(--card); padding: 20px; border-radius: 15px; }
        .ep-btn { background: #252f44; color: white; border: none; padding: 15px 0; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .ep-btn.active { background: var(--accent); color: #000; }
        .ad-link { color: var(--accent); text-decoration: none; font-weight: bold; display: block; margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
</header>

<div class="main-container">
    <div id="vPlayer" class="video-box">
        <div class="res-v">
            <iframe id="vIframe" src="" allowfullscreen></iframe>
        </div>

    </div>

</div>

        btn.innerText = ep.n;
        btn.onclick = function() {

            btn.classList.add('active');
            player.scrollIntoView({ behavior: 'smooth' });

</body>
</html>
