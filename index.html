<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #00d2ff;
            --bg: #0f141e;
            --card-bg: #1a2233;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        header p { font-size: 0.9rem; opacity: 0.9; }

        .container {
            max-width: 1000px;
            width: 95%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .show-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            height: 380px; 
        }

        .show-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.15);
        }

        .image-box {
            width: 100%;
            height: 250px; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #treasure-island-card .image-box img {
            transform: scale(1.15) translateY(-15px);
        }

        .info {
            padding: 15px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info h2 { font-size: 1.2rem; margin-bottom: 10px; }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
        }

        footer { margin: 40px 0 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <h1>صدى الطفولة</h1>
    <p>أجمل مسلسلات الزمن الجميل</p>
</header>

<div class="container">
