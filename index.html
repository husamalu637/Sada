    <style>

        .video-display-area { background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--primary); margin-bottom: 30px; display: none; }
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; background: var(--card); padding: 25px; border-radius: 20px; }
        .ep-btn { background: #252f44; color: white; border: 2px solid transparent; padding: 15px 0; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .ep-btn.active { background: var(--accent); color: black; }
        footer { margin-top: 50px; padding: 20px; opacity: 0.4; }
