<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | مشاهدة مباشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #050a0f; --card: #111b27; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; text-align: center; }
        header { background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 30px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .episode-card { background: var(--card); border: 1px solid #1e2d3d; border-radius: 15px; padding: 25px; margin-bottom: 25px; transition: 0.3s; }
        .episode-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .watch-btn { 
            display: block; 
            background: var(--primary); 
            color: #050a0f; 
            text-decoration: none; 
            padding: 15px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: 'Cairo';
        }
        .footer { opacity: 0.4; font-size: 0.8rem; margin-top: 50px; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
    <p>بوابتك لمشاهدة عدنان ولينا بجودة عالية</p>
</header>

<div class="container">
    <div class="episode-card">
        <h3>عدنان ولينا - الحلقة 01</h3>
        <button onclick="watchDirect('https://www.mediafire.com/file/rl31j4k92jmqa9r/u1h7YzE7bvdhkd7dfWNW_19_0ab2552dcae83525f55ccbe4d4ed2fe6_video_480p_converted.mp4/file')" class="watch-btn">تشغيل الآن 📺</button>
    </div>

    <div class="episode-card">
        <h3>عدنان ولينا - الحلقة 02</h3>
        <button onclick="watchDirect('رابط_الحلقة_الثانية_من_ميديا_فاير')" class="watch-btn">قريباً.. ⏳</button>
    </div>
</div>

<footer class="footer">جميع الحقوق محفوظة - صدى الطفولة &copy; 2026</footer>

<script>
    function watchDirect(videoUrl) {
        // رابط الإعلان الربحي الخاص بك
        const adLink = 'https://www.profitablecpmratenetwork.com/e41dj2h87?key=bef514b5ca3fa945e7a3b60e4a9ef21a';
        
        // 1. فتح الإعلان في نافذة جديدة لضمان احتساب الأرباح
        window.open(adLink, '_blank');
        
        // 2. تحويل المتابع لصفحة المشاهدة في ميديا فاير
        setTimeout(function() {
            window.location.href = videoUrl;
        }, 800);
    }
</script>

</body>
</html>
