<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | أرشيف الكرتون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: var(--card);
            color: white;
            border: 2px solid var(--primary);
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 1rem;
        }

        .tab-btn.active {
            background: var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            color: #000;
        }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 0 auto;
            text-align: center;
        }

        /* منطقة المشغل */
        .video-display-area {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
            display: none; 
            position: relative;
        }

        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }

        .now-playing {
            padding: 15px;
            background: #161e2e;
            color: var(--primary);
            font-weight: bold;
            border-top: 1px solid #252f44;
        }

        /* شبكة الحلقات */
        .episodes-section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .episodes-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 12px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: 2px solid transparent;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .ep-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        .ep-btn.active {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }

        .ad-banner {
            width: 100%;
            max-width: 728px;
            background: #1a2233;
            border: 1px dashed #444;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            color: #888;
        }

        h2 { color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 2.5rem; font-weight: 900;">صـدى الطفـولة</h1>
    <p style="margin:5px 0 0 0; opacity: 0.9;">أجمل مسلسلات الكرتون بجودة عالية</p>
</header>

<div class="main-container">
    
    <div class="tabs-container">
        <button class="tab-btn active" onclick="showSeries('adnana')">عدنان ولينا</button>
        <button class="tab-btn" onclick="showSeries('robin')">روبن هود</button>
        <button class="tab-btn" onclick="showSeries('grendizer')">جريندايزر</button>
    </div>

    <div id="videoPlayerArea" class="video-display-area">
        <div class="responsive-iframe">
            <iframe id="mainPlayer" src="" allowfullscreen></iframe>
        </div>
        <div id="nowPlayingTitle" class="now-playing"></div>
    </div>

    <div class="ad-banner">
        إعلان مفعل - ضع كود شركتك الإعلانية هنا
    </div>

    <div id="adnana" class="episodes-section active">
        <h2>مغامرات عدنان ولينا</h2>
        <div class="episodes-grid" id="grid-adnana"></div>
    </div>

    <div id="robin" class="episodes-section">
        <h2>روبن هود: السهم الناري</h2>
        <div class="episodes-grid" id="grid-robin"></div>
    </div>

    <div id="grendizer" class="episodes-section">
        <h2>مغامرات الفضاء: جريندايزر</h2>
        <div class="episodes-grid" id="grid-grendizer"></div>
    </div>

</div>

<script>
    // قاعدة بيانات الحلقات
    const seriesData = {
        adnana: {
            title: "عدنان ولينا",
            baseUrl: "https://meyon.com.ye/videos/embed/",
            count: 26,
            ids: ["02f3...", "02f3...", "02f3..."] // أكمل إضافة الـ IDs الخاصة بك هنا
        },
        robin: {
            title: "روبن هود",
            baseUrl: "https://meyon.com.ye/videos/embed/",
            count: 52,
            ids: Array(38).fill("placeholder").concat([
                "13f60796-d3ff-4592-a50e-2d063f36c3c7", // 39
                "a88a04f9-260f-49af-beed-e7997b3e9b44", // 40
                "a5bebf0e-5ca3-4dec-bf48-a1da52d32334", // 41
                "9396b996-61a1-43dc-9353-0c4bc5f3dbbc", // 42
                "placeholder", // 43 (أضف الـ ID هنا)
                "placeholder", // 44 (أضف الـ ID هنا)
                "1c590a49-4ad1-42ae-a733-c2e7a164d76a", // 45
                "f59cc0ce-dfe5-4e87-b796-e8e445f2df63", // 46
                "fbe871a7-22b1-4b3e-a025-677786dae114", // 47
                "65814fcc-bd76-4fc5-94cc-a493cd023b0b", // 48
                "ed0c0af5-5e93-4314-83ce-1b4fa8538e9f", // 49
                "07ba6fc0-119d-41d6-bbcf-0f5994e45a27", // 50
                "6be8d54d-4317-4bd2-9539-5dd2e27c4f8b", // 51
                "1dc50eb5-2698-4992-a93b-302e9eb5f71c"  // 52
            ])
        },
        grendizer: {
            title: "جريندايزر",
            baseUrl: "https://meyon.com.ye/videos/embed/",
            count: 40,
            ids: [] // أضف الـ IDs الخاصة بجريندايزر هنا
        }
    };

    // تبديل المسلسلات
    function showSeries(seriesId) {
        document.querySelectorAll('.episodes-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(seriesId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // إنشاء الأزرار
    function init() {
        for (let series in seriesData) {
            const grid = document.getElementById(`grid-${series}`);
            for (let i = 1; i <= seriesData[series].count; i++) {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.innerText = i;
                btn.onclick = (e) => playVideo(series, i, seriesData[series].ids[i-1], e);
                grid.appendChild(btn);
            }
        }
    }

    // تشغيل الفيديو ونظام الإعلانات
    function playVideo(seriesKey, epNum, videoId, event) {
        if (!videoId || videoId === "placeholder") {
            alert("رابط هذه الحلقة سيتم إضافته قريباً!");
            return;
        }

        const playerArea = document.getElementById('videoPlayerArea');
        const iframe = document.getElementById('mainPlayer');
        const titleLabel = document.getElementById('nowPlayingTitle');

        // فتح إعلان في نافذة جديدة (Pop-under)
        window.open('https://your-ad-link.com', '_blank');

        // تحديث المشغل
        playerArea.style.display = 'block';
        iframe.src = seriesData[seriesKey].baseUrl + videoId;
        titleLabel.innerText = `أنت تشاهد الآن: ${seriesData[seriesKey].title} - الحلقة ${epNum}`;

        // تمييز الزر والتمرير
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        playerArea.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = init;
</script>

</body>
</html>
