<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | أرشيف الكرتون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .main-container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
        }

        /* منطقة مشغل الفيديو */
        .video-display-area {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 30px;
            display: none; 
            position: relative;
        }

        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }

        /* شبكة أزرار الحلقات */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .ep-btn {
            background: #252f44;
            color: white;
            border: 2px solid transparent;
            padding: 15px 0;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .ep-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
            border-color: white;
        }

        .ep-btn.active {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px var(--accent);
        }

        h2 {
            color: var(--accent);
            margin: 30px 0 15px 0;
            border-right: 5px solid var(--primary);
            padding-right: 15px;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>صـدى الطفـولة</h1>
    <p>أجمل ذكريات الكرتون العربي</p>
</header>

<div class="main-container">
    
    <div id="videoArea" class="video-display-area">
        <div class="responsive-iframe">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
        <div id="videoTitle" style="padding: 10px; background: #161e2e; color: var(--primary);"></div>
    </div>

    <h2>مغامرات عدنان ولينا</h2>
    <div class="episodes-grid">
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/ID_HERE', 'عدنان ولينا - حلقة 1', this)">1</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/ID_HERE', 'عدنان ولينا - حلقة 2', this)">2</button>
        </div>

    <h2>روبن هود: السهم الناري</h2>
    <div class="episodes-grid">
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/13f60796-d3ff-4592-a50e-2d063f36c3c7', 'روبن هود - حلقة 39', this)">39</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/a88a04f9-260f-49af-beed-e7997b3e9b44', 'روبن هود - حلقة 40', this)">40</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/a5bebf0e-5ca3-4dec-bf48-a1da52d32334', 'روبن هود - حلقة 41', this)">41</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/9396b996-61a1-43dc-9353-0c4bc5f3dbbc', 'روبن هود - حلقة 42', this)">42</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/1c590a49-4ad1-42ae-a733-c2e7a164d76a', 'روبن هود - حلقة 45', this)">45</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/1dc50eb5-2698-4992-a93b-302e9eb5f71c', 'روبن هود - حلقة 52 الأخيرة', this)">52</button>
        </div>

    <h2>مغامرات الفضاء: جريندايزر</h2>
    <div class="episodes-grid">
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/ID_HERE', 'جريندايزر - حلقة 1', this)">1</button>
        <button class="ep-btn" onclick="playVideo('https://meyon.com.ye/videos/embed/ID_HERE', 'جريندايزر - حلقة 2', this)">2</button>
        </div>

</div>

<script>
    function playVideo(url, title, btn) {
        // تفعيل المشغل
        const area = document.getElementById('videoArea');
        const player = document.getElementById('videoPlayer');
        const titleDiv = document.getElementById('videoTitle');

        area.style.display = 'block';
        player.src = url;
        titleDiv.innerText = "أنت تشاهد الآن: " + title;

        // نظام الإعلانات (يفتح عند الضغط على الحلقة)
        window.open('https://your-ad-link.com', '_blank');

        // تمييز الزر النشط
        const btns = document.getElementsByClassName('ep-btn');
        for(let b of btns) { b.classList.remove('active'); }
        btn.classList.add('active');

        // تمرير للمشغل
        area.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
