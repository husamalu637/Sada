    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9800;
            --bg: #0b0f19;
            --card: #161e2e;
        }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 40px 0; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .main-container { max-width: 900px; width: 95%; margin: 20px auto; text-align: center; }
        .video-display-area { background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--primary); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); margin-bottom: 30px; display: none; position: relative; }
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 40px; }
        .ep-btn { background: #252f44; color: white; border: 2px solid transparent; padding: 15px 0; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .ep-btn:hover { background: var(--primary); transform: scale(1.1); border-color: white; }
        .ep-btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); }
        h2 { color: var(--accent); margin: 30px 0 15px 0; border-right: 5px solid var(--primary); padding-right: 15px; text-align: right; }
    </style>

<script>
    function playVideo(url, title, btn) {
        if(url.includes('ID_HERE')) { alert("لم يتم إضافة الرابط بعد!"); return; }
        const area = document.getElementById('videoArea');
        const player = document.getElementById('videoPlayer');
        const titleDiv = document.getElementById('videoTitle');
        area.style.display = 'block';
        player.src = url;
        titleDiv.innerText = "تشاهد الآن: " + title;
        window.open('https://your-ad-link.com', '_blank'); // إعلان Pop-under
        const btns = document.getElementsByClassName('ep-btn');
        for(let b of btns) { b.classList.remove('active'); }
        btn.classList.add('active');
        area.scrollIntoView({ behavior: 'smooth' });
    }
</script>
