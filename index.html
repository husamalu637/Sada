<!DOCTYPE html>

    <meta name="description" content="شاهد جميع حلقات مسلسل عدنان ولينا بجودة عالية على موقع صدى الطفولة.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --accent: #ff9800; --bg: #050a0f; --card: #111b27; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, #00d2ff, #3a7bd5); padding: 40px 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .notice { background: #fff3cd; color: #856404; padding: 15px; margin: 20px auto; max-width: 800px; border-radius: 10px; border-right: 6px solid #ffeeba; font-size: 0.9rem; text-align: center; font-weight: bold; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1250px; margin: auto; }
        .episode-card { background: var(--card); border: 1px solid #1e2d3d; border-radius: 15px; padding: 15px; transition: 0.3s; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .episode-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,210,255,0.2); }
        h3 { margin: 10px 0; font-size: 1.1rem; color: #e0e0e0; }
        .ad-btn { display: block; background: var(--accent); color: black; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; cursor: pointer; border: none; width: 100%; font-family: 'Cairo'; transition: 0.2s; }
        .ad-btn:active { transform: scale(0.98); }
        .video-container { display: none; margin-top: 10px; animation: fadeIn 0.5s; }
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        footer { text-align: center; margin-top: 50px; padding: 30px; border-top: 1px solid #1e2d3d; color: #555; }
    </style>
</head>

    const grid = document.getElementById('episodes-grid');

    episodes.forEach(ep => {

        card.className = 'episode-card';
        card.innerHTML = `
            <h3>عدنان ولينا - ${ep.title}</h3>
            <button onclick="showVideo('${ep.id}')" class="ad-btn">مشاهدة الحلقة 🔓</button>
            <div id="${ep.id}" class="video-container">
                <div class="responsive-iframe">

    function showVideo(id) {
        // فتح الإعلان في نافذة جديدة
        window.open('https://www.profitablecpmratenetwork.com/e41dj2h87?key=bef514b5ca3fa945e7a3b60e4a9ef21a', '_blank');

        const allContainers = document.querySelectorAll('.video-container');
        allContainers.forEach(c => c.style.display = 'none');
        
        // إظهار الفيديو المطلوب
        const target = document.getElementById(id);
        target.style.display = 'block';
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
